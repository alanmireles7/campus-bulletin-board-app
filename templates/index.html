<!DOCTYPE html>
<html>
<head>
    <title>Campus Bulletin Board</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-content">
            <img src="{{ url_for('static', filename='utrgv_logo.png') }}" class="logo">
            <h1>UTRGV Campus Bulletin Board</h1>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">

        <div class="card">
            <h2>Welcome to the Campus Bulletin Board App!</h2>
            <a href="/create" class="btn">Create Post</a>
        </div>

        <h2 class="section-title">Posts</h2>

        {% if posts %}
            <div class="posts">
                {% for post in posts %}
                    <div class="post-card">
                        <h3>{{ post.title }}</h3>
                        <p>{{ post.content }}</p>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="no-posts">No posts yet.</p>
        {% endif %}

    </div>

</body>
</html>
